
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>환영합니다</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #f8f9fa, #e9ecef);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .message {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .message h1 {
      font-size: 2em;
      color: #343a40;
      margin-bottom: 10px;
    }
    .message p {
      font-size: 1.2em;
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="message">
    <h1>임시테스트</h1>
    <p>안녕하세요!.</p>
  </div>
</body>
</html>
